name: staging

on:
  push:
    branches:
      - staging

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Check for new migrations
        id: check_migrations
        run: |
          last_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$last_tag" ]; then
            echo "has_new_migrations=true" >> $GITHUB_OUTPUT
            echo "has_install_sql=true" >> $GITHUB_OUTPUT
          else
            migration_changes=$(git diff --name-only $last_tag -- database/migrations/ 2>/dev/null || echo "")
            
            if [ -n "$migration_changes" ]; then
              echo "has_new_migrations=true" >> $GITHUB_OUTPUT
            else
              echo "has_new_migrations=false" >> $GITHUB_OUTPUT
            fi
            
            if [ -f "database/install.sql" ]; then
              latest_migration=$(ls -t database/migrations/*.php 2>/dev/null | head -1)
              install_sql_date=$(stat -c %Y database/install.sql 2>/dev/null || echo "0")
              migration_date=$(stat -c %Y "$latest_migration" 2>/dev/null || echo "0")
              
              if [ "$migration_date" -gt "$install_sql_date" ]; then
                echo "has_install_sql=true" >> $GITHUB_OUTPUT
              else
                echo "has_install_sql=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "has_install_sql=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate install.sql if needed
        if: steps.check_migrations.outputs.has_new_migrations == 'true' || steps.check_migrations.outputs.has_install_sql == 'true'
        run: |
          sudo systemctl start mysql
          sudo mysql -e "CREATE DATABASE IF NOT EXISTS virel_test"
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=virel_test/' .env
          php artisan migrate --force
          mysqldump -u root --password=root --no-data virel_test > database/install.sql || true

      - name: Create staging zip
        run: |
          zip -r virel_staging.zip . \
            -x ".git/*" \
            -x ".env" \
            -x ".env.example" \
            -x ".env.backup" \
            -x "node_modules/*" \
            -x "vendor/*" \
            -x "tests/*" \
            -x "*.test.*" \
            -x ".phpunit.result.cache" \
            -x ".github/*" \
            -x ".gitignore" \
            -x ".editorconfig" \
            -x ".prettierignore" \
            -x ".prettierrc" \
            -x ".npmrc" \
            -x "eslint.config.js" \
            -x "package.json" \
            -x "package-lock.json" \
            -x "phpunit.xml" \
            -x "pint.json" \
            -x "tailwind.config.js" \
            -x "tsconfig.json" \
            -x "vite.config.ts" \
            -x "composer.json" \
            -x "composer.lock" \
            -x "bootstrap/ssr/*" \
            -x "resources/*" \
            -x "storage/logs/*" \
            -x "storage/pail/*"

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: virel_staging
          path: virel_staging.zip
          retention-days: 30

name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Create frontend zip
        run: |
          zip -r virel-frontend.zip public/ \
            -x "public/.gitignore" \
            -x "public/hot"

      - name: Create backend zip
        run: |
          zip -r virel-backend.zip . \
            -x ".git/*" \
            -x ".env" \
            -x ".env.backup" \
            -x "node_modules/*" \
            -x "tests/*" \
            -x "*.test.*" \
            -x ".phpunit.result.cache" \
            -x ".github/*" \
            -x ".gitignore" \
            -x ".editorconfig" \
            -x ".prettierignore" \
            -x ".prettierrc" \
            -x ".npmrc" \
            -x "eslint.config.js" \
            -x "package.json" \
            -x "package-lock.json" \
            -x "phpunit.xml" \
            -x "pint.json" \
            -x "tailwind.config.js" \
            -x "tsconfig.json" \
            -x "vite.config.ts" \
            -x "composer.json" \
            -x "composer.lock" \
            -x "artisan" \
            -x "bootstrap/ssr/*" \
            -x "resources/views/*" \
            -x "resources/css/*" \
            -x "resources/js/*" \
            -x "resources/fonts/*" \
            -x "routes/channels.php" \
            -x "routes/console.php" \
            -x "storage/logs/*" \
            -x "storage/pail/*"

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: virel-frontend
          path: virel-frontend.zip
          retention-days: 30

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: virel-backend
          path: virel-backend.zip
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            virel-frontend.zip
            virel-backend.zip
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
